<!doctype html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Ceļojošās bildes</title>
  <script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#ffffff; overflow:hidden;
      -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #sketch { position:absolute; inset:0; }
    canvas { display:block; }

    .btn {
      appearance:none; border:0; cursor:pointer;
      font-size:clamp(16px,4.4vw,19px); font-weight:600;
      color:#fff; background:#1c1c5a;
      padding:16px 28px; border-radius:999px;
      box-shadow:0 6px 22px rgba(0,0,0,.18);
      transition:transform .08s ease;
    }
    .btn:active { transform:translateY(1px) scale(.99); }

    #intro { position:fixed; inset:0; z-index:10; display:flex; background:#ffffff; }
    .introInner { margin:auto; display:flex; flex-direction:column; align-items:center; gap:20px; padding:30px 24px; }
    .orline { font-size:13px; color:#999; letter-spacing:.14em; text-transform:uppercase; }

    #fab { position:fixed; z-index:9; left:50%; transform:translateX(-50%);
      bottom:calc(18px + env(safe-area-inset-bottom)); display:none;
      padding:13px 22px; font-size:15px; opacity:.92; }

    #status { position:fixed; z-index:11; left:50%; transform:translateX(-50%);
      top:calc(16px + env(safe-area-inset-top)); display:none; }
    #status.err { font-size:13px; color:#1c1c5a; background:#fff; padding:7px 14px; border-radius:999px; box-shadow:0 2px 10px rgba(0,0,0,.12); }
    .spin { width:30px; height:30px; border:3px solid rgba(28,28,90,.22); border-top-color:#1c1c5a;
      border-radius:50%; display:inline-block; animation:r .8s linear infinite; }
    @keyframes r { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="sketch"></div>
  <div id="status"></div>

  <div id="intro">
    <div class="introInner">
      <button class="btn" id="fileBtn">Izvēlies failu</button>
      <div class="orline">vai</div>
      <button class="btn" id="camBtn">uzņem bildi</button>
    </div>
  </div>

  <button class="btn" id="fab">jauns foto</button>

  <input id="pickFile" type="file" accept="image/*" style="display:none" />
  <input id="pickCam"  type="file" accept="image/*" capture="environment" style="display:none" />

  <script>
    let sketchApi = null;

    const sketch = (p) => {
      const container = document.getElementById("sketch");
      const DESIGN_W = 1100, DESIGN_H = 660;

      const cell = 68;
      const r1x=58,  r1y=24,  r1w=204,     r1h=340;
      const r3x=312, r3y=198, r3w=7*cell,  r3h=cell;
      const r2x=312, r2y=296, r2w=cell,    r2h=cell;
      let   r5x,     r5y=296, r5w=cell,    r5h=cell;
      const r4x=312, r4y=394, r4w=7*cell,  r4h=cell;
      const r6x=838, r6y=296, r6w=204,     r6h=340;
      const r7x=410, r7y=296, r7w=cell,    r7h=cell;   // darkest frame: same line as r2, gap = r2↔strip gap
      const R6_SQUISH = 3/5;                            // 3×5 → 3×3 vertical squish

      const cols=3, rows=5, totalCells=15;
      const speed=0.003, maxBlur=8, blurSteps=60;

      let viewW=1, viewH=1;
      let img=null, fullImg=null, lastFrame=null;
      let slideY, stopAt;
      let phase=-1;
      let slideT=0, fallT=0, moveT=0, shiftT=0;
      let blurredFrames=null;
      let cellCategory=null;
      let iteration=0;
      let colDrops=[0,0,0];
      let colScreenX, colShiftFrom, colShiftTo;
      let curCX=2, curCY=4;
      let lightCount=0, darkCount=0, lightSlots, darkSlots;
      let isDarkest=false, colShiftActive=false;
      let darkestCX=-1, darkestCY=-1, darkestPlaced=false, darkestAlpha=255;
      let sortSpeedMult=1.0, cycleSpeedMult=1.0;   // acceleration (from the previous code)
      let cycleOrder=null, cycleIter=0;
      let f3Exited=0, f4Exited=0;
      let stepShiftT=0, stepShiftActive=false;
      let exitOrigCX=-1, exitOrigCY=-1, exitCellImg=null;
      let outSlideT=0, toF6T=0, phase4timer=0;
      let rotDeg=0, rotAngle=0, rotDir=1, ROT_DEG_PER_FRAME;
      let imageAnalyzed=false, settleTimer=0;
      let f6Count2=0, f6Data=[], f6Used=[];
      let capturedF6=null, usingCapture=false;
      let p8state=0, p8timer=0, squishT=0;
      let activeLoadToken=0, imageReady=false, loadInProgress=false;

      function initArrays() {
        lightSlots = Array.from({length:7}, () => [0,0]);
        darkSlots  = Array.from({length:7}, () => [0,0]);
        f6Data     = Array.from({length:14}, () => [0,0,0,0]);
        f6Used     = new Array(cols*rows).fill(false);
      }

      function initFromImage() {
        if (!img) return;
        fullImg = p.createGraphics(Math.round(r1w), Math.round(r1h));
        const k = Math.max(r1w / img.height, r1h / img.width);   // COVER (with 90° rotation)
        const fillH = img.width * k;
        slideY = -fillH / 2; stopAt = r1h / 2;
        imageAnalyzed = false; settleTimer = 0;
        colScreenX   = [r1x, r1x+cell, r1x+2*cell];
        colShiftFrom = colScreenX.slice();
        colShiftTo   = colScreenX.slice();
        resetCycle1();
        f6Count2 = 0;
        for (let i = 0; i < cols*rows; i++) f6Used[i] = false;
        phase = 0; imageReady = true;
      }

      function renderToFullImg() {
        const src = (usingCapture && capturedF6) ? capturedF6 : img;
        const k = Math.max(r1w / src.height, r1h / src.width);
        fullImg.push();
        fullImg.background(255,255,255);
        fullImg.translate(r1w/2, slideY);
        fullImg.rotate(p.HALF_PI);
        fullImg.imageMode(p.CENTER);
        fullImg.image(src, 0, 0, src.width*k, src.height*k);
        fullImg.imageMode(p.CORNER);
        fullImg.pop();
      }

      function analyzeDarkness() {
        let snap = fullImg.get();
        snap.loadPixels();
        let cd = new Float32Array(totalCells);
        for (let cx = 0; cx < cols; cx++) {
          for (let cy = 0; cy < rows; cy++) {
            let s = 0, n = 0;
            for (let px = Math.floor(cx*cell); px < Math.floor((cx+1)*cell); px++) {
              for (let py = Math.floor(cy*cell); py < Math.floor((cy+1)*cell); py++) {
                if (px < snap.width && py < snap.height) {
                  let idx2 = (py * snap.width + px) * 4;
                  let br2 = 0.2126*snap.pixels[idx2] + 0.7152*snap.pixels[idx2+1] + 0.0722*snap.pixels[idx2+2];
                  s += (255 - br2); n++;
                }
              }
            }
            cd[cy*cols + cx] = (n > 0) ? s / n : 0;
          }
        }
        let indices = Array.from({length: totalCells}, (_, i) => i);
        indices.sort((a, b) => cd[b] - cd[a]);   // darkest first
        cellCategory = new Int32Array(totalCells);
        for (let rank = 0; rank < totalCells; rank++) {
          let i = indices[rank];
          // rank 0 = darkest → r7; next 7 darkest → r4 (BOTTOM); 7 lightest → r3 (TOP)
          cellCategory[i] = (rank === 0) ? 2 : (rank <= 7) ? 1 : 0;
        }
      }

      function precomputeBlurFrames() {
        blurredFrames = new Array(blurSteps);
        for (let s = 0; s < blurSteps; s++) {
          let f = fullImg.get();
          let b = p.map(s, 0, blurSteps-1, 0, maxBlur);
          if (b > 0) f.filter(p.BLUR, b);
          blurredFrames[s] = f;
        }
        lastFrame = blurredFrames[blurSteps - 1];
      }

      function resetCycle1() {
        iteration = 0; lightCount = 0; darkCount = 0;
        colDrops = [0, 0, 0];
        colScreenX   = [r1x, r1x+cell, r1x+2*cell];
        colShiftFrom = colScreenX.slice();
        colShiftTo   = colScreenX.slice();
        colShiftActive = false;
        lightSlots = Array.from({length:7}, () => [0,0]);
        darkSlots  = Array.from({length:7}, () => [0,0]);
        darkestCX = -1; darkestCY = -1; darkestPlaced = false; darkestAlpha = 255;
      }

      function initIteration() {
        curCX = 2 - Math.floor(iteration / rows);
        curCY = rows - 1 - (iteration % rows);
        sortSpeedMult = 1.0 + iteration*0.35;   // each cell sorts a bit faster
      }
      function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2.0; }

      function clipRect(x, y, w, h) { let ctx = p.drawingContext; ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip(); }
      function noClip() { p.drawingContext.restore(); }

      function drawCellAt(sx, sy, origCX, origCY, fx, fy, fw, fh) {
        let ix = Math.max(sx, fx), iy = Math.max(sy, fy);
        let iw = Math.min(sx+cell, fx+fw) - ix, ih = Math.min(sy+cell, fy+fh) - iy;
        if (iw <= 0 || ih <= 0) return;
        clipRect(ix, iy, Math.ceil(iw), Math.ceil(ih));
        p.image(lastFrame, sx - origCX*cell, sy - origCY*cell);
        noClip();
      }

      function drawRotatedCellAt(cx, cy, angleDeg, fx, fy, fw, fh) {
        let ix = Math.max(cx, fx), iy = Math.max(cy, fy);
        let iw = Math.min(cx+cell, fx+fw) - ix, ih = Math.min(cy+cell, fy+fh) - iy;
        if (iw <= 0 || ih <= 0) return;
        clipRect(ix, iy, Math.ceil(iw), Math.ceil(ih));
        p.push();
        p.translate(cx + cell/2.0, cy + cell/2.0);
        p.rotate(p.radians(angleDeg));
        p.imageMode(p.CENTER);
        p.image(exitCellImg, 0, 0, cell, cell);
        p.imageMode(p.CORNER);
        p.pop();
        noClip();
      }

      function drawColumn(cx, screenX, dropped, isFalling, fp) {
        if (dropped >= rows) return;
        let clipX = Math.max(screenX, r1x);
        let clipW = Math.min(screenX + cell, r1x + r1w) - clipX;
        if (clipW <= 0) return;
        let imageY = r1y + (dropped + (isFalling ? fp : 0)) * cell;
        let clipH = isFalling ? (rows - 1 + fp) * cell - 1 : r1h;
        clipH = Math.min(clipH, r1h);
        if (clipH <= 0) return;
        clipRect(clipX, r1y, Math.ceil(clipW), Math.floor(clipH));
        p.image(lastFrame, screenX - cx*cell, imageY);
        noClip();
      }

      function drawFrame1(activeCX, fp) {
        p.noStroke(); p.fill(255); p.rect(r1x,r1y,r1w,r1h);
        for (let cx = 0; cx < cols; cx++)
          drawColumn(cx, colScreenX[cx], colDrops[cx], (cx === activeCX), (cx === activeCX) ? fp : 0);
      }

      /* Shrink to small squares CENTRED in each big cell. */
      function drawCells(sf, bs) {
        p.noStroke(); p.fill(255); p.rect(r1x,r1y,r1w,r1h);
        let ds = cell * sf, frame = blurredFrames[bs];
        for (let cx = 0; cx < cols; cx++) {
          for (let cy = 0; cy < rows; cy++) {
            let scx = r1x + cx*cell + cell/2.0, scy = r1y + cy*cell + cell/2.0;
            clipRect(scx - ds/2, scy - ds/2, Math.ceil(ds), Math.ceil(ds));
            p.image(frame, r1x, r1y);
            noClip();
          }
        }
      }

      /* r3 / r4 hold whole 68×68 squares, stacked left-to-right in one aligned line. */
      function drawPlacedCells() {
        for (let k = 0; k < lightCount; k++) {
          let sx = r3x + k * cell;
          clipRect(sx, r3y, cell, cell);
          p.image(lastFrame, sx - lightSlots[k][0]*cell, r3y - lightSlots[k][1]*cell);
          noClip();
        }
        for (let k = 0; k < darkCount; k++) {
          let sx = r4x + k * cell;
          clipRect(sx, r4y, cell, cell);
          p.image(lastFrame, sx - darkSlots[k][0]*cell, r4y - darkSlots[k][1]*cell);
          noClip();
        }
      }

      function drawDarkestFrame() {
        p.noStroke(); p.fill(255); p.rect(r7x, r7y, r7w, r7h);
        if (!darkestPlaced || darkestAlpha <= 0) return;
        p.tint(255, darkestAlpha);
        clipRect(r7x, r7y, r7w, r7h);
        p.image(lastFrame, r7x - darkestCX*cell, r7y - darkestCY*cell);
        noClip();
        p.noTint();
      }

      function advanceShift() {
        if (!colShiftActive) return;
        shiftT = Math.min(shiftT + speed*3.0*sortSpeedMult, 1.0);
        let se = easeInOut(shiftT);
        for (let cx = 0; cx < cols; cx++) colScreenX[cx] = p.lerp(colShiftFrom[cx], colShiftTo[cx], se);
      }

      function completeIteration() {
        let cat = cellCategory[curCY*cols + curCX];
        if (cat === 0) { lightSlots[lightCount][0] = curCX; lightSlots[lightCount][1] = curCY; lightCount++; }
        else if (cat === 1) { darkSlots[darkCount][0] = curCX; darkSlots[darkCount][1] = curCY; darkCount++; }
        else if (cat === 2) { darkestCX = curCX; darkestCY = curCY; darkestPlaced = true; }
        colDrops[curCX]++;
        if (colShiftActive) { for (let cx = 0; cx < cols; cx++) colScreenX[cx] = colShiftTo[cx]; colShiftActive = false; }
        iteration++;
        if (iteration >= totalCells) { phase = 4; phase4timer = 0; return; }
        initIteration();
        phase = 2; slideT = 0; fallT = 0;
      }

      function setupCycle() {
        let startLight = p.random(1) < 0.5;
        cycleOrder = new Array(14);
        for (let i = 0; i < 14; i++) cycleOrder[i] = startLight ? (i % 2 === 0) : (i % 2 === 1);
        cycleIter = 0; f3Exited = 0; f4Exited = 0;
        stepShiftT = 0; stepShiftActive = false; f6Count2 = 0;
        for (let i = 0; i < cols*rows; i++) f6Used[i] = false;
      }

      function startCycleStep() {
        let fromLight = cycleOrder[cycleIter];
        if (fromLight) { let j = lightCount - f3Exited - 1; exitOrigCX = lightSlots[j][0]; exitOrigCY = lightSlots[j][1]; }
        else { let j = darkCount - f4Exited - 1; exitOrigCX = darkSlots[j][0]; exitOrigCY = darkSlots[j][1]; }
        exitCellImg = lastFrame.get(exitOrigCX * Math.floor(cell), exitOrigCY * Math.floor(cell), Math.floor(cell), Math.floor(cell));
        outSlideT = 0; rotDeg = 0; toF6T = 0;
        rotAngle = 90.0; rotDir = (p.random(1) < 0.5 ? 1 : -1);   // 90° left or right
        cycleSpeedMult = 1.0 + (13 - cycleIter)*0.35;   // fast at the start of the cycle
        stepShiftT = 0; stepShiftActive = false;
        phase = 5;
      }

      function completeCycleStep() {
        let fromLight = cycleOrder[cycleIter];
        if (fromLight) f3Exited++; else f4Exited++;
        stepShiftT = 0; stepShiftActive = false;
        let slot;
        if (f6Count2 === 0) { slot = 0; f6Used[0] = true; }
        else {
          let avail = [];
          for (let i = 0; i < cols*rows; i++) if (!f6Used[i]) avail.push(i);
          slot = avail[Math.floor(p.random(avail.length))];
          f6Used[slot] = true;
        }
        f6Data[f6Count2][0] = slot;
        f6Data[f6Count2][1] = exitOrigCX;
        f6Data[f6Count2][2] = exitOrigCY;
        f6Data[f6Count2][3] = Math.floor(rotAngle * rotDir);
        f6Count2++; cycleIter++;
        if (cycleIter >= 14) { phase = 8; p8state = 0; p8timer = 0; squishT = 0; return; }
        startCycleStep();
      }

      function drawFrame3Out(lightStep) {
        p.noStroke(); p.fill(255); p.rect(r3x,r3y,r3w,r3h);
        let rem = lightCount - f3Exited;
        if (rem <= 0) return;
        let drawCount = lightStep ? rem - 1 : rem;
        let shiftOff = (lightStep && stepShiftActive) ? easeInOut(stepShiftT)*cell : 0;
        for (let j = 0; j < drawCount; j++) {
          let sx = r3x + (j + f3Exited)*cell + shiftOff;
          let ix = Math.max(sx, r3x), iw = Math.min(sx + cell, r3x + r3w) - ix;
          if (iw <= 0) continue;
          clipRect(ix, r3y, Math.ceil(iw), r3h);
          p.image(lastFrame, sx - lightSlots[j][0]*cell, r3y - lightSlots[j][1]*cell);
          noClip();
        }
      }

      function drawFrame4Out(darkStep) {
        p.noStroke(); p.fill(255); p.rect(r4x,r4y,r4w,r4h);
        let rem = darkCount - f4Exited;
        if (rem <= 0) return;
        let drawCount = darkStep ? rem - 1 : rem;
        let shiftOff = (darkStep && stepShiftActive) ? easeInOut(stepShiftT)*cell : 0;
        for (let j = 0; j < drawCount; j++) {
          let sx = r4x + (j + f4Exited)*cell + shiftOff;
          let ix = Math.max(sx, r4x), iw = Math.min(sx + cell, r4x + r4w) - ix;
          if (iw <= 0) continue;
          clipRect(ix, r4y, Math.ceil(iw), r4h);
          p.image(lastFrame, sx - darkSlots[j][0]*cell, r4y - darkSlots[j][1]*cell);
          noClip();
        }
      }

      /* Draw the 15 r6 cells in a clean 3×5 grid (each rotated as recorded). */
      function drawF6Cells() {
        for (let i = 0; i < f6Count2; i++) {
          let slotVal = f6Data[i][0];
          let gcx = slotVal % cols, gcy = Math.floor(slotVal / cols);
          let sx = r6x + gcx*cell, sy = r6y + gcy*cell;
          let angleDeg = f6Data[i][3];
          let c = lastFrame.get(f6Data[i][1]*Math.floor(cell), f6Data[i][2]*Math.floor(cell), Math.floor(cell), Math.floor(cell));
          p.push();
          p.translate(sx + cell/2.0, sy + cell/2.0);
          p.rotate(p.radians(angleDeg));
          p.imageMode(p.CENTER);
          p.image(c, 0, 0, cell, cell);
          p.imageMode(p.CORNER);
          p.pop();
        }
      }
      function drawFrame6() {
        p.noStroke(); p.fill(255); p.rect(r6x,r6y,r6w,r6h);
        drawF6Cells();
      }
      /* 3×5 → 3×3: scale the whole grid vertically about its centre (sf: 1.0 → 3/5). */
      function drawFrame6Squished(sf) {
        p.noStroke(); p.fill(255); p.rect(r6x,r6y,r6w,r6h);
        const cy = r6y + r6h/2;
        clipRect(r6x, r6y, r6w, r6h);
        p.push();
        p.translate(0, cy); p.scale(1, sf); p.translate(0, -cy);
        drawF6Cells();
        p.pop();
        noClip();
      }

      /* Capture the squished r6 (3×3) so it can re-enter r1 on the loop. */
      function captureFrame6(sf) {
        let pg = p.createGraphics(Math.round(r6w), Math.round(r6h));
        pg.background(255,255,255);
        const cy = r6h/2;
        pg.push();
        pg.translate(0, cy); pg.scale(1, sf); pg.translate(0, -cy);
        for (let i = 0; i < f6Count2; i++) {
          let slotVal = f6Data[i][0];
          let gcx = slotVal % cols, gcy = Math.floor(slotVal / cols);
          let sx = gcx*cell, sy = gcy*cell;
          let angleDeg = f6Data[i][3];
          let c = lastFrame.get(f6Data[i][1]*Math.floor(cell), f6Data[i][2]*Math.floor(cell), Math.floor(cell), Math.floor(cell));
          pg.push();
          pg.translate(sx + cell/2.0, sy + cell/2.0);
          pg.rotate(p.radians(angleDeg));
          pg.imageMode(p.CENTER);
          pg.image(c, 0, 0, cell, cell);
          pg.imageMode(p.CORNER);
          pg.pop();
        }
        pg.pop();
        capturedF6 = pg.get();
      }

      /* ==== p5 lifecycle ==== */
      let lastMouseMoveT = 0;
      p.setup = () => {
        const rect = container.getBoundingClientRect();
        viewW = Math.max(1, Math.floor(rect.width));
        viewH = Math.max(1, Math.floor(rect.height));
        const cnv = p.createCanvas(viewW, viewH);
        cnv.parent("sketch");
        p.pixelDensity(Math.min(window.devicePixelRatio || 1, 2));
        p.frameRate(60);
        lastMouseMoveT = p.millis();
        r5x = r3x + r3w - r5w;
        ROT_DEG_PER_FRAME = 360.0 * speed * 1.2;
        initArrays();

        sketchApi = {
          setImage(dataUrl) {
            if (!dataUrl) return;
            const token = ++activeLoadToken;
            loadInProgress = true;
            p.loadImage(dataUrl, (loaded) => {
              if (token !== activeLoadToken) return;
              loadInProgress = false;
              img = loaded; usingCapture = false; capturedF6 = null;
              initFromImage();
            }, () => { loadInProgress = false; });
          }
        };
      };

      p.draw = () => {
        if (p.millis() - lastMouseMoveT > 2000) p.noCursor();
        p.background(255,255,255);
        const scale = Math.min(viewW / DESIGN_W, viewH / DESIGN_H);
        const offsetX = (viewW - DESIGN_W*scale) / 2, offsetY = (viewH - DESIGN_H*scale) / 2;
        p.push();
        p.translate(offsetX, offsetY);
        p.scale(scale);

        if (phase === -1 || !img) { p.pop(); return; }

        if (phase === 0) {
          renderToFullImg();
          if (slideY < stopAt) {
            slideY = Math.min(slideY + 1.5, stopAt);          // original entrance speed
          } else if (!imageAnalyzed) {
            analyzeDarkness(); precomputeBlurFrames();
            imageAnalyzed = true; settleTimer = 0;
          } else {
            settleTimer++;                                    // hold ~1s fully in, then shrink
            if (settleTimer >= 60) { phase = 1; slideT = 0; }
          }
          clipRect(r1x, r1y, r1w, r1h);
          p.image(fullImg, r1x, r1y);
          noClip();

        } else if (phase === 1) {
          slideT = Math.min(slideT + speed, 1.0);
          let sf = 1.0 - 0.5 * Math.sin(slideT * Math.PI);
          let bs = p.constrain(Math.floor(p.map(slideT, 0, 1, 0, blurSteps-1)), 0, blurSteps-1);
          drawCells(sf, bs);
          if (slideT >= 1.0) { initIteration(); phase = 2; slideT = 0; fallT = 0; }

        } else if (phase === 2) {
          let startX = colScreenX[curCX];
          slideT = Math.min(slideT + speed*1.5*sortSpeedMult, 1.0);
          let curX = p.lerp(startX, r2x, easeInOut(slideT));
          let f1Right = r1x + r1w;
          if (curX >= f1Right) {
            fallT = Math.min(fallT + speed*8.0*sortSpeedMult, 1.0);
            if (colDrops[curCX] === rows - 1 && !colShiftActive) {
              colShiftFrom = colScreenX.slice(); colShiftTo = colScreenX.slice();
              for (let cx = 0; cx < curCX; cx++) colShiftTo[cx] += cell;
              shiftT = 0; colShiftActive = true;
            }
          }
          advanceShift();
          drawFrame1(curCX, easeInOut(fallT));
          drawCellAt(curX, r2y, curCX, curCY, r1x, r1y, r1w, r1h);
          drawCellAt(curX, r2y, curCX, curCY, r2x, r2y, r2w, r2h);
          drawPlacedCells(); drawDarkestFrame();
          if (slideT >= 1.0) { isDarkest = (cellCategory[curCY*cols + curCX] === 2); phase = 3; moveT = 0; }

        } else if (phase === 3) {
          advanceShift();
          drawFrame1(curCX, 1.0);
          drawPlacedCells(); drawDarkestFrame();
          let cat = cellCategory[curCY*cols + curCX];
          moveT = Math.min(moveT + speed*1.5*sortSpeedMult, 1.0);
          let e = easeInOut(moveT);
          let fadeOut = Math.floor(255*(1.0-e)), fadeIn = Math.floor(255*e);
          // fade OUT where it sat (r2)
          p.tint(255, fadeOut);
          drawCellAt(r2x, r2y, curCX, curCY, r2x, r2y, r2w, r2h);
          p.noTint();
          // fade IN at the destination: light → r3 (top), dark → r4 (bottom), darkest → r7 (right)
          p.tint(255, fadeIn);
          if (isDarkest) {
            drawCellAt(r7x, r7y, curCX, curCY, r7x, r7y, r7w, r7h);
          } else if (cat === 0) {
            drawCellAt(r3x + lightCount*cell, r3y, curCX, curCY, r3x, r3y, r3w, r3h);
          } else {
            drawCellAt(r4x + darkCount*cell, r4y, curCX, curCY, r4x, r4y, r4w, r4h);
          }
          p.noTint();
          if (moveT >= 1.0) completeIteration();

        } else if (phase === 4) {
          drawFrame1(-1, 0); drawPlacedCells(); drawDarkestFrame();
          phase4timer++;
          if (phase4timer > 90) { setupCycle(); startCycleStep(); }

        } else if (phase === 5) {
          outSlideT = Math.min(outSlideT + speed*1.5*cycleSpeedMult, 1.0);
          let fromLight = cycleOrder[cycleIter];
          let startY = fromLight ? r3y : r4y;
          let curY = p.lerp(startY, r5y, easeInOut(outSlideT));
          if (!stepShiftActive) {
            let cleared = fromLight ? (curY > r3y + r3h) : (curY + cell < r4y);
            if (cleared) { stepShiftActive = true; stepShiftT = 0; }
          }
          if (stepShiftActive) stepShiftT = Math.min(stepShiftT + speed*3.0*cycleSpeedMult, 1.0);
          drawFrame1(-1, 0); drawFrame3Out(fromLight); drawFrame4Out(!fromLight); drawDarkestFrame();
          if (fromLight) drawCellAt(r5x, curY, exitOrigCX, exitOrigCY, r3x, r3y, r3w, r3h);
          else           drawCellAt(r5x, curY, exitOrigCX, exitOrigCY, r4x, r4y, r4w, r4h);
          drawCellAt(r5x, curY, exitOrigCX, exitOrigCY, r5x, r5y, r5w, r5h);
          drawFrame6();
          if (outSlideT >= 1.0) phase = 6;

        } else if (phase === 6) {
          rotDeg = Math.min(rotDeg + ROT_DEG_PER_FRAME*cycleSpeedMult, rotAngle);
          let fromLight = cycleOrder[cycleIter];
          if (stepShiftActive) stepShiftT = Math.min(stepShiftT + speed*3.0*cycleSpeedMult, 1.0);
          drawFrame1(-1, 0); drawFrame3Out(fromLight); drawFrame4Out(!fromLight); drawFrame6(); drawDarkestFrame();
          let cx5 = r5x + r5w/2.0, cy5 = r5y + r5h/2.0;
          p.push();
          p.translate(cx5, cy5);
          p.rotate(p.radians(rotDeg * rotDir));
          p.imageMode(p.CENTER);
          p.image(exitCellImg, 0, 0, r5w, r5h);
          p.imageMode(p.CORNER);
          p.pop();
          if (rotDeg >= rotAngle) { phase = 7; toF6T = 0; }

        } else if (phase === 7) {
          toF6T = Math.min(toF6T + speed*1.5*cycleSpeedMult, 1.0);
          let fromLight = cycleOrder[cycleIter];
          if (stepShiftActive) stepShiftT = Math.min(stepShiftT + speed*3.0*cycleSpeedMult, 1.0);
          drawFrame1(-1, 0); drawFrame3Out(fromLight); drawFrame4Out(!fromLight); drawFrame6(); drawDarkestFrame();
          if (f6Count2 === 0) {
            let cx7 = p.lerp(r5x, r6x, easeInOut(toF6T));
            drawRotatedCellAt(cx7, r5y, rotAngle * rotDir, r5x, r5y, r5w, r5h);
            drawRotatedCellAt(cx7, r5y, rotAngle * rotDir, r6x, r6y, r6w, r6h);
          } else {
            let cx7 = p.lerp(r5x, r5x + r5w, easeInOut(toF6T));
            drawRotatedCellAt(cx7, r5y, rotAngle * rotDir, r5x, r5y, r5w, r5h);
          }
          if (toF6T >= 1.0) completeCycleStep();

        } else if (phase === 8) {
          drawFrame1(-1, 0); drawFrame3Out(false); drawFrame4Out(false); drawDarkestFrame();
          if (p8state === 0) {
            drawFrame6(); p8timer++;
            if (p8timer >= 60) { p8state = 1; squishT = 0; }
          } else if (p8state === 1) {
            squishT = Math.min(squishT + speed*1.5, 1.0);
            darkestAlpha = Math.floor(255 * (1.0 - easeInOut(squishT)));   // darkest fades away
            drawFrame6Squished(p.lerp(1.0, R6_SQUISH, easeInOut(squishT)));
            if (squishT >= 1.0) { p8state = 2; p8timer = 0; }
          } else if (p8state === 2) {
            drawFrame6Squished(R6_SQUISH);
            p8timer++;
            if (p8timer >= 45) {
              captureFrame6(R6_SQUISH);
              usingCapture = true;
              resetCycle1();
              f6Count2 = 0;
              for (let i = 0; i < cols*rows; i++) f6Used[i] = false;
              const kc = Math.max(r1w / capturedF6.height, r1h / capturedF6.width);
              slideY = -(capturedF6.width * kc) / 2;
              imageAnalyzed = false; settleTimer = 0;
              phase = 0; p8state = 0;
            }
          }
        }

        p.pop();
      };

      p.mouseMoved = () => { p.cursor(); lastMouseMoveT = p.millis(); };

      p.windowResized = () => {
        const rect = container.getBoundingClientRect();
        viewW = Math.max(1, Math.floor(rect.width));
        viewH = Math.max(1, Math.floor(rect.height));
        p.resizeCanvas(viewW, viewH);
      };
    };

    new p5(sketch);

    /* ===== Upload UI (local only — no server) ===== */
    const pickFile = document.getElementById("pickFile");
    const pickCam  = document.getElementById("pickCam");
    const fileBtn  = document.getElementById("fileBtn");
    const camBtn   = document.getElementById("camBtn");
    const fab      = document.getElementById("fab");
    const intro    = document.getElementById("intro");
    const statusEl = document.getElementById("status");

    function setStatus(html) {
      if (!html) { statusEl.style.display = "none"; statusEl.innerHTML = ""; statusEl.classList.remove("err"); return; }
      statusEl.innerHTML = html;
      statusEl.style.display = "block";
      statusEl.classList.toggle("err", html.indexOf("spin") === -1);
    }

    fileBtn.addEventListener("click", () => pickFile.click());
    camBtn.addEventListener("click", () => pickCam.click());
    fab.addEventListener("click", () => { intro.style.display = "flex"; fab.style.display = "none"; });

    async function toUsableBlob(file) {
      const type = (file.type || "").toLowerCase();
      const name = (file.name || "").toLowerCase();
      const isHeic = type.includes("heic") || type.includes("heif") || name.endsWith(".heic") || name.endsWith(".heif");
      if (!isHeic) return file;
      setStatus('<span class="spin"></span>');
      const out = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.92 });
      return Array.isArray(out) ? out[0] : out;
    }

    function loadIntoSketch(blob) {
      setStatus('<span class="spin"></span>');
      const url = URL.createObjectURL(blob);
      const im = new Image();
      im.onload = () => {
        const maxDim = 1280;
        let w = im.naturalWidth, h = im.naturalHeight;
        const s = Math.min(1, maxDim / Math.max(w, h));
        const cw = Math.max(1, Math.round(w * s)), ch = Math.max(1, Math.round(h * s));
        const c = document.createElement("canvas");
        c.width = cw; c.height = ch;
        c.getContext("2d").drawImage(im, 0, 0, cw, ch);
        URL.revokeObjectURL(url);
        const dataUrl = c.toDataURL("image/jpeg", 0.9);
        if (sketchApi) sketchApi.setImage(dataUrl);
        intro.style.display = "none";
        fab.style.display = "block";
        setStatus("");
      };
      im.onerror = () => { URL.revokeObjectURL(url); setStatus("Neizdevās nolasīt bildi."); };
      im.src = url;
    }

    async function handleFile(file) {
      if (!file) return;
      try { loadIntoSketch(await toUsableBlob(file)); }
      catch (err) { console.error(err); setStatus("Ielāde neizdevās."); }
    }

    pickFile.addEventListener("change", (e) => { handleFile(e.target.files && e.target.files[0]); pickFile.value = ""; });
    pickCam.addEventListener("change",  (e) => { handleFile(e.target.files && e.target.files[0]); pickCam.value  = ""; });
  </script>
</body>
